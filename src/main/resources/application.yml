spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: NexusCommerce
  datasource:
    url: jdbc:mysql://localhost:3306/nexuscommerce
    username: ${username}
    password: ${password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration 
  environment:
    profile:
      active: dev
server:
  port: ${PORT}
