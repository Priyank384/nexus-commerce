spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: NexusCommerce
  datasource:
    url: jdbc:mysql://localhost:3306/fakecommerce
    username: ${username}
    password: ${password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  environment:
    profile:
      active: dev
server:
  port: ${PORT}
